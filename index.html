<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConsultLink // Expert Advisory Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #0B0F19;
            --bg-card: rgba(20, 26, 44, 0.65);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #F3F4F6;
            --text-secondary: #9CA3AF;
            --primary-glow: #8B5CF6;
            --accent-cyan: #06B6D4;
            --danger: #EF4444;
            --success: #10B981;
            --font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: var(--font-family);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Glassmorphism Design System */
        .glass {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
        }

        .text-gradient {
            background: linear-gradient(135deg, var(--primary-glow), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Layout Frameworks */
        .landing-page {
            position: relative;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5rem;
            padding: 1rem 0;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            cursor: pointer;
            text-decoration: none;
            color: var(--text-primary);
        }
        .logo span { color: var(--primary-glow); }

        .hero-section {
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            padding: 2rem 0;
        }

        .hero-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary-glow);
            filter: blur(150px);
            top: -50px;
            left: calc(50% - 150px);
            z-index: -1;
            opacity: 0.25;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1.15;
            margin-bottom: 1.5rem;
            letter-spacing: -1.5px;
        }

        .hero-subtitle {
            color: var(--text-secondary);
            font-size: 1.2rem;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        /* Premium Interface Controls */
        .btn {
            font-family: var(--font-family);
            padding: 0.65rem 1.4rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            border: none;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary-glow), #7C3AED);
            color: white;
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.25);
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(139, 92, 246, 0.35);
        }
        .btn-secondary {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.05); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.8rem; }
        .btn-block { width: 100%; display: flex; }

        /* Complex Dashboard App Shell */
        .dashboard-layout {
            display: flex;
            min-height: calc(100vh - 120px);
            width: 100%;
        }

        .sidebar {
            width: 280px;
            background: #0D1222;
            border-right: 1px solid var(--border-color);
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
        }

        .sidebar-brand {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 2.5rem;
        }
        .sidebar-brand span { color: var(--accent-cyan); }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex-grow: 1;
        }

        .sidebar-menu a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.15s ease;
        }
        .sidebar-menu a.active, .sidebar-menu a:hover {
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-primary);
        }

        .sidebar-footer {
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .profile-name {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .main-content {
            flex-grow: 1;
            padding: 3rem;
            overflow-y: auto;
        }

        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
        }

        .system-status {
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .indicator.live {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--success);
        }

        .status-panel {
            padding: 1rem;
            margin-bottom: 1.5rem;
        }
        .status-panel label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        /* Metrics Data Engine Layout */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .metric-card {
            padding: 1.5rem;
        }
        .metric-card h5 {
            color: var(--text-secondary);
            font-weight: 500;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .metric-card h2 {
            font-size: 2rem;
            font-weight: 700;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
        }

        .max-width-md {
            max-width: 600px;
            padding: 2.5rem;
        }

        /* Tabular Data Components */
        .table-container {
            width: 100%;
            overflow-x: auto;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.9rem;
        }

        .table th {
            padding: 1rem 1.5rem;
            color: var(--text-secondary);
            font-weight: 600;
            border-bottom: 1px solid var(--border-color);
        }

        .table td {
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .text-center { text-align: center; }
        .badge {
            background: rgba(139, 92, 246, 0.15);
            color: var(--primary-glow);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .status-lbl {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--accent-cyan);
        }

        /* Form Subsystem Elements */
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }
        input, select, textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: var(--font-family);
            outline: none;
            transition: border-color 0.15s ease;
        }
        input:focus, select:focus, textarea:focus {
            border-color: var(--primary-glow);
        }

        /* Auth Portal Card Components */
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 120px);
            padding: 2rem 1rem;
        }
        .auth-card {
            width: 100%;
            max-width: 440px;
            padding: 2.5rem;
            position: relative;
        }
        .back-home-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            transition: color 0.2s ease;
        }
        .back-home-btn:hover {
            color: var(--text-primary);
        }
        .auth-footer {
            margin-top: 1.5rem;
            text-align: center;
        }
        .auth-footer a {
            color: var(--accent-cyan);
            font-size: 0.85rem;
            text-decoration: none;
        }

        /* Global Dynamic Toast Engine layout */
        .toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            z-index: 10000;
        }
        .toast {
            padding: 1rem 1.5rem;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideIn 0.3s forwards cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes slideIn {
            from { transform: translateX(120%); }
            to { transform: translateX(0); }
        }

        /* Empty State Clean UI */
        .empty-state {
            padding: 3rem 1.5rem;
            text-align: center;
            color: var(--text-secondary);
        }

        @media(max-width: 768px) {
            .dashboard-layout { flex-direction: column; }
            .sidebar { width: 100%; }
            .main-content { padding: 1.5rem; }
            h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <div id="toast-container" class="toast-container"></div>

    <div id="app-root" style="flex: 1 0 auto;"></div>

    <template id="view-landing">
        <div class="landing-page">
            <header class="navbar">
                <a href="#" class="logo" onclick="Router.navigate('landing')">Consult<span>Link</span></a>
                <div class="nav-actions">
                    <button class="btn btn-secondary" onclick="Router.navigate('auth')">Sign In</button>
                    <button class="btn btn-primary" onclick="Router.navigate('auth')">Get Started</button>
                </div>
            </header>
            <main class="hero-section">
                <div class="hero-glow"></div>
                <h1>Instant Access to Verified <br><span class="text-gradient">Professional Advice.</span></h1>
                <p class="hero-subtitle">Connect with top-tier specialists in law, medicine, finance, and engineering. Schedule sessions, share files, and get answers securely in minutes.</p>
                <div class="cta-group">
                    <button class="btn btn-primary btn-lg" onclick="Router.navigate('auth')">Open Dashboard</button>
                </div>
            </main>
        </div>
    </template>

    <template id="view-auth">
        <div class="auth-container">
            <div class="auth-card glass">
                <a href="#" class="back-home-btn" onclick="Router.navigate('landing')">← Back to Home</a>
                <h2 id="auth-title">Welcome Back</h2>
                <p id="auth-subtitle" style="margin-bottom: 1.5rem; font-size: 0.9rem; color: var(--text-secondary);">Sign in to access your dashboard workspace.</p>
                
                <form id="auth-form" onsubmit="App.handleAuth(event)">
                    <div class="form-group" id="group-fullname" style="display: none;">
                        <label>Your Full Legal Name</label>
                        <input type="text" id="auth-fullname" placeholder="e.g. John Doe">
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="auth-email" required placeholder="name@domain.com">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="auth-password" required placeholder="••••••••">
                    </div>
                    <div class="form-group" id="group-role" style="display: none;">
                        <label>I want to join as a:</label>
                        <select id="auth-role">
                            <option value="client">Client (Seeking Advice)</option>
                            <option value="consultant">Consultant (Offering Advice)</option>
                        </select>
                    </div>
                    <div class="form-group id-consultant-fields" id="group-specialty" style="display: none;">
                        <label>Professional Domain Specialty</label>
                        <select id="auth-specialty">
                            <option value="legal">Legal Frameworks</option>
                            <option value="medical">Medical Advisory</option>
                            <option value="financial">Quantitative Finance</option>
                            <option value="engineering">Systems Engineering</option>
                        </select>
                    </div>
                    <div class="form-group id-consultant-fields" id="group-rate" style="display: none;">
                        <label>Hourly Consulting Rate (ZMW)</label>
                        <input type="number" id="auth-rate" value="1500" placeholder="1500">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block" id="auth-submit-btn">Sign In</button>
                </form>
                <div class="auth-footer">
                    <a href="#" id="auth-toggle-mode" onclick="App.toggleAuthMode(event)">New to the platform? Create an account</a>
                </div>
            </div>
        </div>
    </template>

    <template id="view-client-dashboard">
        <div class="dashboard-layout">
            <aside class="sidebar">
                <div class="sidebar-brand">Consult<span>Link</span></div>
                <nav class="sidebar-menu">
                    <a href="#" id="menu-link-client-overview" class="active" onclick="App.switchTab('client-overview')">Dashboard Overview</a>
                    <a href="#" id="menu-link-client-new-request" onclick="App.switchTab('client-new-request')">Book a Consultant</a>
                </nav>
                <div class="sidebar-footer">
                    <span id="client-profile-name" class="profile-name">User Workstation</span>
                    <button class="btn btn-sm btn-danger" onclick="App.logout()">Sign Out</button>
                </div>
            </aside>
            <main class="main-content">
                <header class="content-header">
                    <h2>Client Dashboard</h2>
                    <div class="system-status"><span class="indicator live"></span>Connected</div>
                </header>
                
                <div id="tab-client-overview" class="dashboard-tab">
                    <div class="metrics-grid">
                        <div class="metric-card glass"><h5>Active Requests</h5><h2 id="m-client-active">0</h2></div>
                        <div class="metric-card glass"><h5>Total Investment</h5><h2 id="m-client-spent">K0.00</h2></div>
                    </div>
                    <h3 class="section-title">Your Consultation History</h3>
                    <div class="table-container glass">
                        <table class="table">
                            <thead>
                                <tr><th>ID</th><th>Category</th><th>Topic Headline</th><th>Status</th><th>Actions</th></tr>
                            </thead>
                            <tbody id="client-requests-table">
                                <tr><td colspan="5" class="text-center empty-state">Loading history logs...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div id="tab-client-new-request" class="dashboard-tab" style="display:none;">
                    <div class="card glass max-width-md">
                        <h3 style="margin-bottom: 1.5rem;">Submit a Project Request</h3>
                        <form id="request-form" onsubmit="App.submitRequest(event)">
                            <div class="form-group">
                                <label>What field do you need help in?</label>
                                <select id="req-category">
                                    <option value="legal">Legal Frameworks</option>
                                    <option value="medical">Medical Advisory</option>
                                    <option value="financial">Quantitative Finance</option>
                                    <option value="engineering">Systems Engineering</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Short Project Headline</label>
                                <input type="text" id="req-title" required placeholder="e.g., Contract review for new digital platform">
                            </div>
                            <div class="form-group">
                                <label>Tell us what you need in detail</label>
                                <textarea id="req-description" rows="5" required placeholder="Provide clear contextual details about your requirements..."></textarea>
                            </div>
                            <div class="form-group">
                                <label>Attach Supporting Documents (Optional)</label>
                                <input type="file" id="req-file">
                            </div>
                            <button type="submit" class="btn btn-primary" id="req-submit-btn">Find Matched Consultant</button>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </template>

    <template id="view-consultant-dashboard">
        <div class="dashboard-layout">
            <aside class="sidebar">
                <div class="sidebar-brand">Consult<span>Link</span></div>
                <div class="status-panel glass">
                    <label>Your Active Status</label>
                    <select id="consultant-status-toggle" onchange="App.updateConsultantStatus(this.value)">
                        <option value="Available">Available (Accepting Offers)</option>
                        <option value="Busy">Busy</option>
                        <option value="Offline">Offline</option>
                    </select>
                </div>
                <nav class="sidebar-menu">
                    <a href="#" class="active">Consultant Panel</a>
                </nav>
                <div class="sidebar-footer">
                    <span id="consultant-profile-name" class="profile-name">Consultant Node</span>
                    <button class="btn btn-sm btn-danger" onclick="App.logout()">Sign Out</button>
                </div>
            </aside>
            <main class="main-content">
                <header class="content-header">
                    <h2>Consultant Portal</h2>
                    <div class="system-status"><span class="indicator live"></span>Verified Profile</div>
                </header>
                <div class="metrics-grid">
                    <div class="metric-card glass"><h5>Total Earnings</h5><h2 id="m-consultant-earnings">K0.00</h2></div>
                    <div class="metric-card glass"><h5>Platform Rating</h5><h2 id="m-consultant-rating">5.00</h2></div>
                </div>
                <h3 class="section-title">Open Client Proposals</h3>
                <div class="table-container glass">
                    <table class="table">
                        <thead>
                            <tr><th>Request ID</th><th>Client Profile</th><th>Project Title</th><th>Actions</th></tr>
                        </thead>
                        <tbody id="consultant-queue-table">
                            <tr><td colspan="4" class="text-center empty-state">Scanning for open requests...</td></tr>
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </template>

    <template id="view-admin-dashboard">
        <div class="dashboard-layout">
            <aside class="sidebar">
                <div class="sidebar-brand">Consult<span>Admin</span></div>
                <nav class="sidebar-menu">
                    <a href="#" class="active">Platform Analytics</a>
                </nav>
                <div class="sidebar-footer">
                    <span class="profile-name">Platform Admin</span>
                    <button class="btn btn-sm btn-danger" onclick="App.logout()">Sign Out</button>
                </div>
            </aside>
            <main class="main-content">
                <header class="content-header">
                    <h2>Admin Management Console</h2>
                </header>
                <h3 class="section-title">Pending Consultant Verification Profiles</h3>
                <div class="table-container glass">
                    <table class="table">
                        <thead>
                            <tr><th>Consultant ID</th><th>Specialty</th><th>Hourly Rate</th><th>Approvals</th></tr>
                        </thead>
                        <tbody id="admin-consultants-table">
                            <tr><td colspan="4" class="text-center empty-state">Querying database registries...</td></tr>
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </template>

    <footer style="width: 100%; padding: 2rem 1rem; margin-top: auto; border-top: 1px solid rgba(255, 255, 255, 0.05); background: rgba(13, 18, 34, 0.4); backdrop-filter: blur(8px); text-align: center; flex-shrink: 0;">
        <div style="max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; gap: 0.5rem;">
            <p style="font-size: 0.85rem; color: rgba(243, 244, 246, 0.6); letter-spacing: 0.5px;">&copy; 2026 ConsultLink Platform. All rights reserved.</p>
            <p style="font-size: 0.8rem; color: rgba(243, 244, 246, 0.4);">Engineered & Maintained by <span style="font-weight: 600; background: linear-gradient(135deg, #06B6D4, #8B5CF6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 0.5px;">Vyeta Digital Solutions</span></p>
        </div>
    </footer>

    <script>
        const ConsultLinkSDK = {
            // REPLACEMENT REQUIRED: Put your macro deployment URL here
            endpoint: "https://script.google.com/macros/s/AKfycbwYOUR_DEPLOYMENT_ID/exec",

            async request(action, payload = {}) {
                const token = sessionStorage.getItem('consultlink_session_token');
                const bodyParameters = { action: action, token: token, payload: payload };

                try {
                    const response = await fetch(this.endpoint, {
                        method: 'POST',
                        mode: 'cors',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify(bodyParameters)
                    });

                    if (!response.ok) throw new Error(`Network response issue: ${response.statusText}`);
                    const data = await response.json();
                    if (!data.success) throw new Error(data.message || "Request was rejected by database.");
                    return data;
                } catch (error) {
                    console.error(`[SDK Engine Exception]:`, error);
                    throw error;
                }
            }
        };

        const Router = {
            currentView: null,
            init() {
                this.navigate('landing');
            },
            navigate(viewName) {
                const template = document.getElementById(`view-${viewName}`);
                if (!template) return;
                
                const appRoot = document.getElementById('app-root');
                appRoot.innerHTML = '';
                appRoot.appendChild(template.content.cloneNode(true));
                this.currentView = viewName;
                
                if (viewName === 'client-dashboard') App.loadClientDashboardData();
                if (viewName === 'consultant-dashboard') App.loadConsultantDashboardData();
                if (viewName === 'admin-dashboard') App.loadAdminDashboardData();
            }
        };

        const App = {
            isSignUpMode: false,

            init() {
                const savedToken = sessionStorage.getItem('consultlink_session_token');
                const savedRole = sessionStorage.getItem('consultlink_session_role');
                if (savedToken && savedRole) {
                    Router.navigate(`${savedRole}-dashboard`);
                }
            },

            showToast(message, type = 'success') {
                const container = document.getElementById('toast-container');
                if (!container) return;
                const toast = document.createElement('div');
                toast.className = `toast glass`;
                toast.style.borderLeft = `4px solid ${type === 'success' ? 'var(--success)' : 'var(--danger)'}`;
                toast.innerText = message;
                container.appendChild(toast);
                setTimeout(() => toast.remove(), 4000);
            },

            toggleAuthMode(e) {
                e.preventDefault();
                this.isSignUpMode = !this.isSignUpMode;
                
                document.getElementById('auth-title').innerText = this.isSignUpMode ? 'Create Your Account' : 'Welcome Back';
                document.getElementById('auth-subtitle').innerText = this.isSignUpMode ? 'Join us as a client or verified advisor.' : 'Sign in to access your dashboard workspace.';
                document.getElementById('group-fullname').style.display = this.isSignUpMode ? 'block' : 'none';
                document.getElementById('group-role').style.display = this.isSignUpMode ? 'block' : 'none';
                document.getElementById('auth-submit-btn').innerText = this.isSignUpMode ? 'Create Account' : 'Sign In';
                document.getElementById('auth-toggle-mode').innerText = this.isSignUpMode ? 'Already have an account? Sign in' : 'New to the platform? Create an account';
                
                if (this.isSignUpMode) {
                    document.getElementById('auth-role').addEventListener('change', (ev) => {
                        const displayStatus = ev.target.value === 'consultant' ? 'block' : 'none';
                        document.querySelectorAll('.id-consultant-fields').forEach(el => el.style.display = displayStatus);
                    });
                } else {
                    document.querySelectorAll('.id-consultant-fields').forEach(el => el.style.display = 'none');
                }
            },

            async handleAuth(e) {
                e.preventDefault();
                const btn = document.getElementById('auth-submit-btn');
                const originalText = btn.innerText;
                
                btn.innerText = "Processing...";
                btn.disabled = true;

                const email = document.getElementById('auth-email').value;
                const password = document.getElementById('auth-password').value;

                try {
                    if (this.isSignUpMode) {
                        const fullName = document.getElementById('auth-fullname').value;
                        const role = document.getElementById('auth-role').value;
                        const payload = { email, password, fullName, role };

                        if (role === 'consultant') {
                            payload.specialty = document.getElementById('auth-specialty').value;
                            payload.ratePerHour = parseFloat(document.getElementById('auth-rate').value);
                        }

                        await ConsultLinkSDK.request('registerUser', payload);
                        this.showToast("Account created successfully. You can now sign in.");
                        this.isSignUpMode = false;
                        Router.navigate('auth');
                    } else {
                        const data = await ConsultLinkSDK.request('loginUser', { email, password });
                        sessionStorage.setItem('consultlink_session_token', data.token);
                        sessionStorage.setItem('consultlink_session_role', data.user.role);
                        sessionStorage.setItem('consultlink_session_user', JSON.stringify(data.user));
                        
                        this.showToast(`Welcome back, ${data.user.fullName}`);
                        Router.navigate(`${data.user.role}-dashboard`);
                    }
                } catch (err) {
                    this.showToast(err.message, 'error');
                } finally {
                    btn.innerText = originalText;
                    btn.disabled = false;
                }
            },

            logout() {
                sessionStorage.clear();
                this.showToast("Signed out successfully.");
                Router.navigate('landing');
            },

            switchTab(tabId) {
                document.querySelectorAll('.dashboard-tab').forEach(el => el.style.display = 'none');
                document.querySelectorAll('.sidebar-menu a').forEach(el => el.classList.remove('active'));
                
                document.getElementById(`tab-${tabId}`).style.display = 'block';
                document.getElementById(`menu-link-${tabId}`).classList.add('active');
            },

            async loadClientDashboardData() {
                try {
                    const user = JSON.parse(sessionStorage.getItem('consultlink_session_user'));
                    document.getElementById('client-profile-name').innerText = user.fullName;
                    
                    const response = await ConsultLinkSDK.request('getClientRequests');
                    const requests = response.requests;
                    
                    document.getElementById('m-client-active').innerText = requests.filter(r => r.status !== 'Completed').length;
                    
                    const tableBody = document.getElementById('client-requests-table');
                    tableBody.innerHTML = '';
                    
                    if(requests.length === 0) {
                        tableBody.innerHTML = `<tr><td colspan="5" class="text-center empty-state">You haven't requested any consultations yet. Click 'Book a Consultant' to get started!</td></tr>`;
                        return;
                    }

                    requests.forEach(req => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${req.id.substring(0,8)}</td>
                            <td><span class="badge">${req.category}</span></td>
                            <td>${req.title}</td>
                            <td><span class="status-lbl">${req.status === 'Open' ? 'Finding Match' : req.status}</span></td>
                            <td>${req.status === 'Matched' ? `<button class="btn btn-sm btn-primary" onclick="App.processPayment('${req.id}')">Approve & Pay Invoice</button>` : '<span style="color:var(--text-secondary); font-size:0.85rem">No action required</span>'}</td>
                        `;
                        tableBody.appendChild(tr);
                    });
                } catch(err) {
                    this.showToast("Failed to sync your dashboard history.", "error");
                }
            },

            async submitRequest(e) {
                e.preventDefault();
                const btn = document.getElementById('req-submit-btn');
                btn.innerText = "Submitting...";
                btn.disabled = true;

                const category = document.getElementById('req-category').value;
                const title = document.getElementById('req-title').value;
                const description = document.getElementById('req-description').value;
                const fileInput = document.getElementById('req-file');

                let fileData = null;
                if(fileInput.files.length > 0) {
                    const file = fileInput.files[0];
                    fileData = {
                        base64: await this.convertFileToBase64(file),
                        mimeType: file.type,
                        name: file.name
                    };
                }

                try {
                    await ConsultLinkSDK.request('createRequest', { category, title, description, fileData });
                    this.showToast("Your project request has been published to our expert network!");
                    this.switchTab('client-overview');
                    this.loadClientDashboardData();
                } catch(err) {
                    this.showToast(err.message, "error");
                } finally {
                    btn.innerText = "Find Matched Consultant";
                    btn.disabled = false;
                }
            },

            async processPayment(requestId) {
                try {
                    await ConsultLinkSDK.request('executePaymentSimulator', { requestId });
                    this.showToast("Payment processed successfully.");
                    this.loadClientDashboardData();
                } catch(err) {
                    this.showToast(err.message, "error");
                }
            },

            async loadConsultantDashboardData() {
                try {
                    const user = JSON.parse(sessionStorage.getItem('consultlink_session_user'));
                    document.getElementById('consultant-profile-name').innerText = user.fullName;
                    
                    const response = await ConsultLinkSDK.request('getConsultantQueue');
                    const queue = response.queue;
                    
                    const tableBody = document.getElementById('consultant-queue-table');
                    tableBody.innerHTML = '';
                    
                    if(queue.length === 0) {
                        tableBody.innerHTML = `<tr><td colspan="4" class="text-center empty-state">No open project listings match your criteria right now. Check back soon!</td></tr>`;
                        return;
                    }

                    queue.forEach(item => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${item.id.substring(0,8)}</td>
                            <td>Anonymous Client</td>
                            <td>${item.title}</td>
                            <td><button class="btn btn-sm btn-primary" onclick="App.acceptJob('${item.id}')">Accept Offer</button></td>
                        `;
                        tableBody.appendChild(tr);
                    });
                } catch (err) {
                    this.showToast("Failed to compile incoming requests.", "error");
                }
            },

            async acceptJob(requestId) {
                try {
                    await ConsultLinkSDK.request('acceptConsultationRequest', { requestId });
                    this.showToast("Proposal accepted. Client has been notified.");
                    this.loadConsultantDashboardData();
                } catch(err) {
                    this.showToast(err.message, "error");
                }
            },

            async updateConsultantStatus(status) {
                try {
                    await ConsultLinkSDK.request('setConsultantStatus', { status });
                    this.showToast(`Your profile status is now set to: ${status}`);
                } catch(err) {
                    this.showToast(err.message, "error");
                }
            },

            async loadAdminDashboardData() {
                try {
                    const response = await ConsultLinkSDK.request('getAdminConsoleData');
                    const tableBody = document.getElementById('admin-consultants-table');
                    tableBody.innerHTML = '';
                    
                    response.consultants.forEach(c => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${c.id.substring(0,8)}</td>
                            <td>${c.specialty}</td>
                            <td>K${c.ratePerHour}/hr</td>
                            <td>${c.isApproved ? '<span class="status-lbl">Verified Active</span>' : `<button class="btn btn-sm btn-primary" onclick="App.approveConsultant('${c.id}')">Approve Expert</button>`}</td>
                        `;
                        tableBody.appendChild(tr);
                    });
                } catch(err) {
                    this.showToast("Admin dashboard data sync interrupted.", "error");
                }
            },

            async approveConsultant(consultantId) {
                try {
                    await ConsultLinkSDK.request('approveConsultantNode', { consultantId });
                    this.showToast("Consultant profile has been verified.");
                    this.loadAdminDashboardData();
                } catch(err) {
                    this.showToast(err.message, "error");
                }
            },

            convertFileToBase64(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = () => resolve(reader.result.split(',')[1]);
                    reader.onerror = error => reject(error);
                });
            }
        };

        document.addEventListener("DOMContentLoaded", () => {
            Router.init();
            App.init();
        });
    </script>
</body>
</html>
