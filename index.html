<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ConsultConnect - Live Sheet Platform</title>
  <!-- Tailwind CSS CDN for complete production styling -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    [v-cloak] { display: none !important; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen flex flex-col">

  <!-- APP CONTAINER -->
  <div id="app" class="flex flex-col flex-grow"></div>

  <!-- MAIN SCRIPT ENGINE -->
  <script>
    /* ── CONFIGURATION ─────────────────────────────────────────────────── */
    // Paste your exact Google Apps Script Web App URL here
    const API_URL = 'https://script.google.com/macros/s/AKfycbwjxNTV72Ypvb8kte0BxqZPB3q50pGUVjHeLvRhZeZAVx9WhIeaB_FmeR5CVXcYdA/exec';

    /* ── REACTIVE STATE MANAGEMENT ─────────────────────────────────────── */
    const S = {
      view: 'landing',        // Options: 'landing', 'client', 'consultant', 'admin'
      auth: false,           // Controls login/signup modal visibility
      amode: 'login',        // Auth modal sub-state: 'login' or 'register'
      role: 'client',        // Active registration role target: 'client' or 'consultant'
      user: null,            // Currently authenticated user object record
      cons: [],              // Marketplace: Complete list of available consultants
      myRequests: [],        // Client view: Array of requests created by current user
      inc: [],               // Consultant view: Dynamic contextual incoming matchmaking requests
      adminData: {           // Admin view: System telemetry data aggregates
        users: [],
        requests: []
      }
    };

    /* ── CORE API TRANSPORT ENGINE (CORS-COMPLIANT) ───────────────────── */
    /**
     * Executes robust, secure cross-domain requests directly to Google Apps Script.
     * Enforces URL parameter serialization to strictly bypass pre-flight CORS errors.
     */
    async function apiRequest(action, data = {}) {
      const sessionToken = localStorage.getItem('cl_session_token');
      
      // Transform arguments into URL encoded parameters to avoid preflight blocks
      const params = new URLSearchParams();
      params.append('action', action);
      if (sessionToken) params.append('token', sessionToken);
      params.append('data', JSON.stringify(data));

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          body: params,
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
        });

        if (!response.ok) throw new Error(`HTTP Error Status: ${response.status}`);
        
        const result = await response.json();
        if (!result.success) throw new Error(result.error || 'Unknown server error.');
        
        return result.data;
      } catch (error) {
        console.error(`[API Network Error] Action: ${action} | Details:`, error);
        alert(`Database Connection Failure:\n${error.message}`);
        throw error;
      }
    }

    /* ── DATA WORKFLOWS & LOGIC ────────────────────────────────────────── */
    
    async function initializeDashboardData() {
      if (!localStorage.getItem('cl_session_token')) return;
      
      try {
        if (S.view === 'client') {
          const [consultants, requests] = await Promise.all([
            apiRequest('consultant.list'),
            apiRequest('request.myRequests')
          ]);
          S.cons = consultants || [];
          S.myRequests = requests || [];
        } 
        else if (S.view === 'consultant') {
          const incoming = await apiRequest('consultant.incoming');
          S.inc = incoming || [];
        } 
        else if (S.view === 'admin') {
          const systemData = await apiRequest('admin.getSystemOverview');
          S.adminData.users = systemData.users || [];
          S.adminData.requests = systemData.requests || [];
        }
        render();
      } catch (err) {
        console.error("Error synchronizing active dashboard arrays:", err);
      }
    }

    async function handleAuthSubmit(e) {
      e.preventDefault();
      const form = e.target;
      const email = form.email.value.trim();
      const password = form.password.value;
      
      const isRegister = S.amode === 'register';
      const action = isRegister ? 'auth.register' : 'auth.login';
      
      const payload = { email, password };
      if (isRegister) {
        payload.name = form.username.value.trim();
        payload.role = S.role;
        if (S.role === 'consultant') {
          payload.specialization = form.specialization.value;
        }
      }

      try {
        const responseData = await apiRequest(action, payload);
        
        // Retain session authentication profiles across browser tabs/refreshes
        localStorage.setItem('cl_session_token', responseData.token);
        localStorage.setItem('cl_user_profile', JSON.stringify(responseData.user));
        
        S.user = responseData.user;
        S.view = responseData.user.role; // Transition to corresponding interface template
        S.auth = false; // Close out modal overlay
        
        await initializeDashboardData();
      } catch (err) {
        // Core transport mechanism handles alerting user
      }
    }

    async function handleCreateRequestSubmit(e) {
      e.preventDefault();
      const form = e.target;
      
      const payload = {
        category: form.category.value,
        title: form.title.value.trim(),
        urgency: form.urgency.value,
        budget: form.budget.value.trim(),
        description: form.description.value.trim()
      };

      try {
        await apiRequest('request.create', payload);
        alert('Consultation ticket published directly to Spreadsheet rows!');
        form.reset();
        await initializeDashboardData();
      } catch (err) {
        // Handled globally
      }
    }

    function handleLogout() {
      localStorage.removeItem('cl_session_token');
      localStorage.removeItem('cl_user_profile');
      S.user = null;
      S.view = 'landing';
      render();
    }

    /* ── REACTIVE RENDER ENGINE & UI COMPONENTS ───────────────────────── */
    const el = (tag, attrs = {}, children = []) => {
      const element = document.createElement(tag);
      Object.entries(attrs).forEach(([k, v]) => {
        if (k.startsWith('on') && typeof v === 'function') {
          element.addEventListener(k.substring(2).toLowerCase(), v);
        } else if (k === 'class') {
          element.className = v;
        } else {
          element.setAttribute(k, v);
        }
      });
      children.forEach(child => {
        if (typeof child === 'string') element.appendChild(document.createTextNode(child));
        else if (child) element.appendChild(child);
      });
      return element;
    };

    function renderNavbar() {
      return el('nav', { class: 'bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between shadow-sm' }, [
        el('div', { class: 'flex items-center space-x-3 cursor-pointer', onclick: () => { S.view = S.user ? S.user.role : 'landing'; render(); } }, [
          el('div', { class: 'w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-black shadow-md shadow-indigo-200' }, ['C']),
          el('span', { class: 'text-xl font-bold tracking-tight bg-gradient-to-r from-indigo-600 to-violet-600 bg-clip-text text-transparent' }, ['ConsultConnect'])
        ]),
        el('div', { class: 'flex items-center space-x-4' }, 
          S.user ? [
            el('div', { class: 'text-right hidden md:block' }, [
              el('p', { class: 'text-sm font-semibold text-slate-900' }, [S.user.name]),
              el('p', { class: 'text-xs text-slate-500 capitalize font-medium' }, [`${S.user.role} workspace`])
            ]),
            el('button', { 
              class: 'bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2 rounded-lg text-sm font-medium transition cursor-pointer',
              onclick: handleLogout
            }, ['Sign Out'])
          ] : [
            el('button', { 
              class: 'text-slate-600 hover:text-slate-900 px-3 py-2 text-sm font-medium cursor-pointer',
              onclick: () => { S.auth = true; S.amode = 'login'; render(); }
            }, ['Sign In']),
            el('button', { 
              class: 'bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl text-sm font-semibold shadow-md shadow-indigo-100 transition cursor-pointer',
              onclick: () => { S.auth = true; S.amode = 'register'; S.role = 'client'; render(); }
            }, ['Get Started'])
          ]
        )
      ]);
    }

    function renderLanding() {
      return el('div', { class: 'max-w-5xl mx-auto px-6 py-16 text-center flex-grow flex flex-col justify-center' }, [
        el('h1', { class: 'text-5xl md:text-6xl font-black text-slate-900 tracking-tight leading-tight mb-6' }, [
          'On-Demand Expert Consulting\n',
          el('span', { class: 'bg-gradient-to-r from-indigo-600 to-violet-600 bg-clip-text text-transparent' }, ['Powered by Google Sheets'])
        ]),
        el('p', { class: 'text-xl text-slate-600 max-w-2xl mx-auto mb-10 leading-relaxed' }, [
          'Submit dynamic advice requests, connect with validated business consultants, and audit operational milestones in real-time.'
        ]),
        el('div', { class: 'flex flex-col sm:flex-row justify-center items-center gap-4 mb-16' }, [
          el('button', { 
            class: 'w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-4 rounded-xl font-bold shadow-lg shadow-indigo-200 text-lg transition cursor-pointer',
            onclick: () => { S.auth = true; S.amode = 'register'; S.role = 'client'; render(); }
          }, ['Hire an Expert']),
          el('button', { 
            class: 'w-full sm:w-auto bg-white border border-slate-200 text-slate-700 hover:bg-slate-50 px-8 py-4 rounded-xl font-bold text-lg shadow-sm transition cursor-pointer',
            onclick: () => { S.auth = true; S.amode = 'register'; S.role = 'consultant'; render(); }
          }, ['Join as Consultant'])
        ])
      ]);
    }

    function renderClientDashboard() {
      return el('div', { class: 'max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-8 flex-grow w-full' }, [
        // Left Column: Issue Ticket Creation Form
        el('div', { class: 'bg-white border border-slate-200 rounded-2xl p-6 shadow-sm h-fit' }, [
          el('h2', { class: 'text-xl font-bold text-slate-900 mb-1' }, ['New Consultation Request']),
          el('p', { class: 'text-xs text-slate-500 mb-6' }, ['Dispatches metadata rows directly onto spreadsheet logic pipelines.']),
          el('form', { onsubmit: handleCreateRequestSubmit, class: 'space-y-4' }, [
            el('div', {}, [
              el('label', { class: 'block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1' }, ['Category Domain']),
              el('select', { name: 'category', class: 'w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500' }, [
                el('option', { value: 'Strategy' }, ['Corporate Strategy']),
                el('option', { value: 'Finance' }, ['Financial & Tax Structuring']),
                el('option', { value: 'Technology' }, ['Software Architecture']),
                el('option', { value: 'Marketing' }, ['Growth Marketing'])
              ])
            ]),
            el('div', {}, [
              el('label', { class: 'block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1' }, ['Short Summary Title']),
              el('input', { name: 'title', type: 'text', required: true, placeholder: 'e.g., Formulating Scale Roadmap', class: 'w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500' })
            ]),
            el('div', { class: 'grid grid-cols-2 gap-4' }, [
              el('div', {}, [
                el('label', { class: 'block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1' }, ['Urgency Priority']),
                el('select', { name: 'urgency', class: 'w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-3 text-sm focus:outline-none focus:border-indigo-500' }, [
                  el('option', { value: 'Standard' }, ['Standard']),
                  el('option', { value: 'Urgent' }, ['Urgent Emergency'])
                ])
              ]),
              el('div', {}, [
                el('label', { class: 'block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1' }, ['Allotted Budget ($)']),
                el('input', { name: 'budget', type: 'number', required: true, placeholder: '500', class: 'w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-3 text-sm focus:outline-none focus:border-indigo-500' })
              ])
            ]),
            el('div', {}, [
              el('label', { class: 'block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1' }, ['Operational Description Brief']),
              el('textarea', { name: 'description', required: true, rows: '4', placeholder: 'Provide full contextual objectives for evaluation...', class: 'w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500' })
            ]),
            el('button', { type: 'submit', class: 'w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition cursor-pointer shadow-md' }, ['Broadcast Request'])
          ])
        ]),
        // Right Column: Active Marketplace & Historical Consultation Records
        el('div', { class: 'lg:col-span-2 space-y-8' }, [
          // Active Requests Table
          el('div', { class: 'bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden' }, [
            el('div', { class: 'px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/50' }, [
              el('h3', { class: 'font-bold text-slate-900' }, ['Your Open Consultation Pipelines']),
              el('button', { onclick: initializeDashboardData, class: 'text-xs font-bold text-indigo-600 hover:text-indigo-800 cursor-pointer' }, ['Refresh Live Sheet Data'])
            ]),
            el('div', { class: 'divide-y divide-slate-100 overflow-x-auto' }, 
              S.myRequests.length ? S.myRequests.map(r => el('div', { class: 'p-6 hover:bg-slate-50/50 transition' }, [
                el('div', { class: 'flex items-start justify-between gap-4 mb-2' }, [
                  el('div', {}, [
                    el('span', { class: `inline-block text-[10px] uppercase tracking-wider font-extrabold px-2.5 py-1 rounded-md mb-2 ${r.urgency === 'Urgent' ? 'bg-rose-50 text-rose-600 border border-rose-100' : 'bg-slate-100 text-slate-600'}` }, [r.category]),
                    el('h4', { class: 'font-semibold text-slate-900 text-base' }, [r.title])
                  ]),
                  el('span', { class: 'font-bold text-slate-900 bg-slate-100 px-3 py-1 rounded-lg text-sm' }, [`$${r.budget}`])
                ]),
                el('p', { class: 'text-sm text-slate-600 mb-3 line-clamp-2' }, [r.description]),
                el('div', { class: 'flex items-center justify-between text-xs text-slate-400' }, [
                  el('span', {}, [`ID: ${r.id.substring(0,8)}...` || 'Pending...']),
                  el('span', { class: `font-semibold px-2 py-0.5 rounded ${r.status === 'Open' ? 'text-emerald-600 bg-emerald-50' : 'text-amber-600 bg-amber-50'}` }, [r.status || 'Active'])
                ])
              ])) : [el('div', { class: 'p-8 text-center text-slate-400 text-sm' }, ['No live requests recorded. Submit the tracking form to push rows.'])]
            )
          ]),
          // Consultants Roster Available
          el('div', { class: 'bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden' }, [
            el('div', { class: 'px-6 py-4 border-b border-slate-100 bg-slate-50/50' }, [
              el('h3', { class: 'font-bold text-slate-900' }, ['Available Enterprise Experts Available'])
            ]),
            el('div', { class: 'p-6 grid grid-cols-1 md:grid-cols-2 gap-4' }, 
              S.cons.length ? S.cons.map(c => el('div', { class: 'border border-slate-100 bg-slate-50/50 p-4 rounded-xl flex items-center space-x-4' }, [
                el('div', { class: 'w-12 h-12 rounded-full bg-gradient-to-tr from-indigo-500 to-violet-500 flex items-center justify-center text-white font-bold' }, [c.name.charAt(0)]),
                el('div', {}, [
                  el('h4', { class: 'font-bold text-slate-900' }, [c.name]),
                  el('p', { class: 'text-xs text-slate-500' }, [c.specialization || 'General Management']),
                  el('p', { class: 'text-[11px] text-emerald-600 font-medium mt-1' }, ['● Verified Advisor'])
                ])
              ])) : [el('div', { class: 'col-span-2 text-center text-slate-400 text-sm py-4' }, ['No expert profiles verified inside spreadsheet rows.'])]
            )
          ])
        ])
      ]);
    }

    function renderConsultantDashboard() {
      return el('div', { class: 'max-w-4xl mx-auto p-6 flex-grow w-full' }, [
        el('div', { class: 'flex justify-between items-center mb-6' }, [
          el('div', {}, [
            el('h2', { class: 'text-2xl font-bold text-slate-900' }, [`Welcome Back, ${S.user.name}`]),
            el('p', { class: 'text-sm text-slate-500' }, [`Domain Expertise focus: ${S.user.specialization || 'General Consulting'}`])
          ]),
          el('button', { onclick: initializeDashboardData, class: 'bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 px-4 py-2 rounded-xl text-sm font-semibold shadow-sm cursor-pointer' }, ['Sync Target Pipelines'])
        ]),
        el('div', { class: 'bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden' }, [
          el('div', { class: 'px-6 py-4 border-b border-slate-100 bg-slate-50/50' }, [
            el('h3', { class: 'font-bold text-slate-900' }, ['Incoming Marketplace Placement Offers Matching Your Domain Expertise'])
          ]),
          el('div', { class: 'divide-y divide-slate-100' }, 
            S.inc.length ? S.inc.map(r => el('div', { class: 'p-6 hover:bg-slate-50/50 transition flex flex-col md:flex-row justify-between items-start md:items-center gap-4' }, [
              el('div', { class: 'space-y-1 max-w-xl' }, [
                el('div', { class: 'flex items-center space-x-2' }, [
                  el('span', { class: 'bg-indigo-50 text-indigo-600 font-extrabold text-[10px] px-2 py-0.5 rounded uppercase tracking-wider' }, [r.category]),
                  el('span', { class: `text-[10px] font-bold px-1.5 py-0.5 rounded ${r.urgency === 'Urgent' ? 'bg-rose-50 text-rose-600' : 'bg-slate-100 text-slate-500'}` }, [r.urgency])
                ]),
                el('h4', { class: 'font-bold text-slate-900 text-base' }, [r.title]),
                el('p', { class: 'text-sm text-slate-600 line-clamp-2' }, [r.description])
              ]),
              el('div', { class: 'text-right w-full md:w-auto flex md:flex-col justify-between md:justify-center items-center md:items-end gap-2' }, [
                el('span', { class: 'text-lg font-black text-slate-900 block' }, [`$${r.budget}`]),
                el('button', { 
                  onclick: async () => {
                    if (confirm('Accept assignment parameters and bind details to this row?')) {
                      await apiRequest('request.accept', { id: r.id });
                      alert('Row locked to your execution profile.');
                      await initializeDashboardData();
                    }
                  },
                  class: 'bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold px-4 py-2 rounded-lg shadow-md transition cursor-pointer' 
                }, ['Accept Work Offer'])
              ])
            ])) : [el('div', { class: 'p-12 text-center text-slate-400 text-sm' }, ['No unassigned consultation request matching your criteria listed in backend matrices at present.'])]
          )
        ])
      ]);
    }

    function renderAdminDashboard() {
      return el('div', { class: 'max-w-7xl mx-auto p-6 flex-grow w-full space-y-8' }, [
        el('div', { class: 'flex justify-between items-center' }, [
          el('div', {}, [
            el('h2', { class: 'text-2xl font-bold text-slate-900' }, ['Administrative Ledger Core Dashboard']),
            el('p', { class: 'text-sm text-slate-500' }, ['Global system data tracking access points.'])
          ]),
          el('button', { onclick: initializeDashboardData, class: 'bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl text-sm font-semibold cursor-pointer' }, ['Force Global Cache Purge'])
        ]),
        el('div', { class: 'grid grid-cols-1 md:grid-cols-2 gap-8' }, [
          // Users Table Ledger
          el('div', { class: 'bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden' }, [
            el('div', { class: 'px-6 py-4 border-b border-slate-100 bg-slate-50/50' }, [el('h3', { class: 'font-bold text-slate-900' }, ['Registered Database Accounts (Users Sheet)'])]),
            el('div', { class: 'overflow-x-auto' }, [
              el('table', { class: 'w-full text-left border-collapse text-sm' }, [
                el('thead', { class: 'bg-slate-50 text-slate-500 uppercase text-[10px] tracking-wider border-b border-slate-100' }, [
                  el('tr', {}, [
                    el('th', { class: 'p-4' }, ['Name']), el('th', { class: 'p-4' }, ['Email Line Address']), el('th', { class: 'p-4' }, ['Role Mapping'])
                  ])
                ]),
                el('tbody', { class: 'divide-y divide-slate-100' }, 
                  S.adminData.users.length ? S.adminData.users.map(u => el('tr', {}, [
                    el('td', { class: 'p-4 font-semibold text-slate-900' }, [u.name]),
                    el('td', { class: 'p-4 text-slate-600' }, [u.email]),
                    el('td', { class: 'p-4 text-xs' }, [el('span', { class: `px-2 py-0.5 rounded font-bold capitalize ${u.role === 'admin' ? 'bg-purple-100 text-purple-700' : u.role === 'consultant' ? 'bg-blue-100 text-blue-700' : 'bg-slate-100 text-slate-700'}` }, [u.role])])
                  ])) : [el('tr', {}, [el('td', { colspan: 3, class: 'p-8 text-center text-slate-400' }, ['No system registrations mapped.'])] )]
                )
              ])
            ])
          ]),
          // Requests Database View
          el('div', { class: 'bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden' }, [
            el('div', { class: 'px-6 py-4 border-b border-slate-100 bg-slate-50/50' }, [el('h3', { class: 'font-bold text-slate-900' }, ['Global Transaction Records (Requests Sheet)'])]),
            el('div', { class: 'overflow-x-auto' }, [
              el('table', { class: 'w-full text-left border-collapse text-sm' }, [
                el('thead', { class: 'bg-slate-50 text-slate-500 uppercase text-[10px] tracking-wider border-b border-slate-100' }, [
                  el('tr', {}, [
                    el('th', { class: 'p-4' }, ['Title Task']), el('th', { class: 'p-4' }, ['Budget']), el('th', { class: 'p-4' }, ['Status Value Mapping'])
                  ])
                ]),
                el('tbody', { class: 'divide-y divide-slate-100' }, 
                  S.adminData.requests.length ? S.adminData.requests.map(r => el('tr', {}, [
                    el('td', { class: 'p-4 text-slate-900 font-medium' }, [r.title]),
                    el('td', { class: 'p-4 font-bold text-slate-700' }, [`$${r.budget}`]),
                    el('td', { class: 'p-4 text-xs' }, [el('span', { class: `px-2 py-0.5 rounded font-semibold ${r.status === 'Open' ? 'text-emerald-700 bg-emerald-50' : 'text-amber-700 bg-amber-50'}` }, [r.status || 'Active'])])
                  ])) : [el('tr', {}, [el('td', { colspan: 3, class: 'p-8 text-center text-slate-400' }, ['No master dataset objects loaded.'])] )]
                )
              ])
            ])
          ])
        ])
      ]);
    }

    function renderAuthModal() {
      if (!S.auth) return null;
      const isReg = S.amode === 'register';
      
      return el('div', { class: 'fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50' }, [
        el('div', { class: 'bg-white rounded-2xl max-w-md w-full p-8 shadow-xl relative animate-in fade-in zoom-in-95 duration-150' }, [
          el('button', { 
            class: 'absolute top-4 right-4 text-slate-400 hover:text-slate-600 text-xl font-bold cursor-pointer w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-100',
            onclick: () => { S.auth = false; render(); }
          }, ['×']),
          el('h3', { class: 'text-2xl font-bold text-slate-900 mb-2' }, [isReg ? 'Create Platform Profile' : 'Account Identity Validation']),
          el('p', { class: 'text-sm text-slate-500 mb-6' }, [isReg ? 'Gain access to database consultation services.' : 'Input credentials to resume database session loops.']),
          
          isReg ? el('div', { class: 'flex bg-slate-100 p-1 rounded-xl mb-6' }, [
            el('button', { 
              class: `flex-1 text-center py-2 text-xs font-bold rounded-lg transition cursor-pointer ${S.role === 'client' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-800'}`,
              onclick: () => { S.role = 'client'; render(); }
            }, ['Client Role']),
            el('button', { 
              class: `flex-1 text-center py-2 text-xs font-bold rounded-lg transition cursor-pointer ${S.role === 'consultant' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-800'}`,
              onclick: () => { S.role = 'consultant'; render(); }
            }, ['Consultant Expert'])
          ]) : null,

          el('form', { onsubmit: handleAuthSubmit, class: 'space-y-4' }, [
            isReg ? el('div', {}, [
              el('label', { class: 'block text-xs font-bold text-slate-600 uppercase mb-1' }, ['Full Display Name']),
              el('input', { name: 'username', type: 'text', required: true, placeholder: 'John Doe', class: 'w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500' })
            ]) : null,
            el('div', {}, [
              el('label', { class: 'block text-xs font-bold text-slate-600 uppercase mb-1' }, ['Email Address']),
              el('input', { name: 'email', type: 'email', required: true, placeholder: 'you@example.com', class: 'w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500' })
            ]),
            isReg && S.role === 'consultant' ? el('div', {}, [
              el('label', { class: 'block text-xs font-bold text-slate-600 uppercase mb-1' }, ['Specialization Expertise Category']),
              el('select', { name: 'specialization', class: 'w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500' }, [
                el('option', { value: 'Strategy' }, ['Corporate Strategy']),
                el('option', { value: 'Finance' }, ['Financial & Tax Structuring']),
                el('option', { value: 'Technology' }, ['Software Architecture']),
                el('option', { value: 'Marketing' }, ['Growth Marketing'])
              ])
            ]) : null,
            el('div', {}, [
              el('label', { class: 'block text-xs font-bold text-slate-600 uppercase mb-1' }, ['Account Password']),
              el('input', { name: 'password', type: 'password', required: true, placeholder: '••••••••', class: 'w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500' })
            ]),
            el('button', { type: 'submit', class: 'w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl text-sm transition shadow-lg shadow-indigo-100 mt-2 cursor-pointer' }, [
              isReg ? 'Complete Sheet Registration' : 'Validate and Transmit'
            ]),
            el('div', { class: 'text-center mt-4' }, [
              el('button', { 
                type: 'button',
                class: 'text-xs text-indigo-600 font-semibold hover:underline cursor-pointer',
                onclick: () => { S.amode = isReg ? 'login' : 'register'; render(); }
              }, [isReg ? 'Already registered? Login here.' : 'Need a system login account? Form profile.'])
            ])
          ])
        ])
      ]);
    }

   function renderFooter() {
      return el('footer', { class: 'mt-auto border-t border-slate-200 bg-white py-12 px-6' }, [
        el('div', { class: 'max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-6' }, [
          
          // Branding Block
          el('div', { class: 'flex items-center space-x-3' }, [
            // Icon with Vyeta Custom Electric Blue and Turquoise Gradient
            el('div', { class: 'w-9 h-9 rounded-xl bg-gradient-to-tr from-[#0052FF] to-[#00E5FF] flex items-center justify-center text-white font-black shadow-md shadow-cyan-100' }, ['V']),
            el('div', { class: 'flex flex-col' }, [
              el('span', { class: 'text-base font-bold tracking-tight text-slate-900' }, [
                'Vyeta ',
                el('span', { class: 'bg-gradient-to-r from-[#0052FF] to-[#00E5FF] bg-clip-text text-transparent' }, ['Digital Solutions'])
              ]),
              el('span', { class: 'text-[10px] text-slate-400 font-medium tracking-wider uppercase' }, ['Next-Gen Ecosystems'])
            ])
          ]),

          // Operational Architecture Status Tag
          el('div', { class: 'flex items-center space-x-2 bg-slate-50 border border-slate-100 px-3 py-1.5 rounded-xl' }, [
            el('span', { class: 'relative flex h-2 w-2' }, [
              el('span', { class: 'animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75' }),
              el('span', { class: 'relative inline-flex rounded-full h-2 w-2 bg-emerald-500' })
            ]),
            el('span', { class: 'text-[11px] font-semibold text-slate-500' }, [
              'System Status: ',
              el('span', { class: 'text-slate-800' }, ['Live Connection'])
            ])
          ]),

          // Copyright and Architecture Meta Trace
          el('div', { class: 'text-center md:text-right text-xs text-slate-400 font-medium' }, [
            el('p', {}, [`© ${new Date().getFullYear()} Vyeta Digital Solutions. All rights reserved.`]),
            el('p', { class: 'text-[10px] text-slate-300 mt-0.5 font-mono' }, ['Secured via Static Token Architecture & Google App Engine'])
          ])

        ])
      ]);
    }
    }

    function render() {
      const root = document.getElementById('app');
      root.innerHTML = '';
      
      root.appendChild(renderNavbar());
      
      if (S.view === 'landing') root.appendChild(renderLanding());
      else if (S.view === 'client') root.appendChild(renderClientDashboard());
      else if (S.view === 'consultant') root.appendChild(renderConsultantDashboard());
      else if (S.view === 'admin') root.appendChild(renderAdminDashboard());
      
      root.appendChild(renderFooter());
      
      const modal = renderAuthModal();
      if (modal) root.appendChild(modal);
    }

    /* ── RUNTIME INITIALIZATION ────────────────────────────────────────── */
    window.addEventListener('DOMContentLoaded', async () => {
      const savedToken = localStorage.getItem('cl_session_token');
      const savedProfile = localStorage.getItem('cl_user_profile');
      
      if (savedToken && savedProfile) {
        try {
          S.user = JSON.parse(savedProfile);
          S.view = S.user.role; // Automatically point routing target
          await initializeDashboardData();
        } catch (e) {
          console.error("Corrupted profile data trace elements cleared.");
          handleLogout();
        }
      } else {
        S.view = 'landing';
        render();
      }
    });
  </script>
</body>
</html>
