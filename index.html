<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConsultLink // Professional On-Demand Experts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #0B0F19;
            --bg-card: rgba(20, 26, 44, 0.65);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #F3F4F6;
            --text-secondary: #9CA3AF;
            --primary-glow: #8B5CF6;
            --accent-cyan: #06B6D4;
            --danger: #EF4444;
            --success: #10B981;
            --warning: #F59E0B;
            --font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: var(--font-family);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .glass {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
        }

        .text-gradient {
            background: linear-gradient(135deg, var(--primary-glow), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .landing-page { padding: 2rem; max-width: 1200px; margin: 0 auto; width: 100%; flex: 1; display: flex; flex-direction: column; }
        .navbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4rem; width: 100%; }
        .logo { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px; }
        .logo span { color: var(--primary-glow); }

        .hero-grid { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 3rem; align-items: center; margin: auto 0; }
        @media (max-width: 900px) { .hero-grid { grid-template-columns: 1fr; text-align: center; gap: 2rem; } .hero-left { margin: 0 auto; max-width: 600px; } }

        h1 { font-size: 3.2rem; font-weight: 800; line-height: 1.15; margin-bottom: 1.5rem; letter-spacing: -1.5px; }
        
        .hero-subtitle {
            color: var(--text-secondary);
            font-size: 1.05rem; 
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        /* Simulated Human Presence Dashboard */
        .simulated-console { padding: 1.5rem; border: 1px solid rgba(6, 182, 212, 0.2); box-shadow: 0 15px 35px rgba(0,0,0,0.4); text-align: left; }
        .console-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border-color); }
        .console-title { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--accent-cyan); display: flex; align-items: center; gap: 0.5rem; }
        .console-status { font-size: 0.75rem; color: var(--success); display: flex; align-items: center; gap: 0.35rem; }
        .dot { width: 6px; height: 6px; background: var(--success); border-radius: 50%; display: inline-block; box-shadow: 0 0 8px var(--success); }
        
        .expert-pool-list { display: flex; flex-direction: column; gap: 0.75rem; min-height: 340px; }
        .pool-item { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 1rem; background: rgba(255,255,255,0.02); border-radius: 6px; border: 1px solid rgba(255,255,255,0.03); transition: all 0.3s ease; }
        .pool-info { display: flex; flex-direction: column; gap: 0.15rem; }
        .pool-name { font-size: 0.9rem; font-weight: 600; color: var(--text-primary); }
        .pool-domain { font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
        .pool-status-tag { font-size: 0.75rem; font-weight: 700; color: var(--accent-cyan); background: rgba(6, 182, 212, 0.1); padding: 0.2rem 0.5rem; border-radius: 4px; border: 1px solid rgba(6, 182, 212, 0.15); }

        .btn { font-family: var(--font-family); padding: 0.6rem 1.2rem; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; border: none; font-size: 0.9rem; }
        .btn-primary { background: linear-gradient(135deg, var(--primary-glow), #7C3AED); color: white; box-shadow: 0 4px 20px rgba(139, 92, 246, 0.25); }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(139, 92, 246, 0.35); }
        .btn-secondary { background: transparent; color: var(--text-primary); border: 1px solid var(--border-color); }
        .btn-secondary:hover { background: rgba(255,255,255,0.05); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-warning { background: var(--warning); color: white; }
        .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.8rem; }
        .btn-block { width: 100%; display: block; }

        /* Accessible Friendly Back Navigation Link */
        .back-nav { display: inline-flex; align-items: center; gap: 0.5rem; color: var(--text-secondary); text-decoration: none; font-size: 0.85rem; font-weight: 500; margin-bottom: 1.5rem; cursor: pointer; transition: color 0.2s; }
        .back-nav:hover { color: var(--accent-cyan); }

        .dashboard-layout { display: flex; min-height: 100vh; flex: 1; }
        .sidebar { width: 280px; background: #0D1222; border-right: 1px solid var(--border-color); padding: 2rem 1.5rem; display: flex; flex-direction: column; }
        .sidebar-brand { font-size: 1.3rem; font-weight: 700; margin-bottom: 2.5rem; }
        .sidebar-brand span { color: var(--accent-cyan); }
        .sidebar-menu { display: flex; flex-direction: column; gap: 0.5rem; flex-grow: 1; }
        .sidebar-menu a { color: var(--text-secondary); text-decoration: none; padding: 0.75rem 1rem; border-radius: 8px; font-weight: 500; transition: all 0.15s ease; }
        .sidebar-menu a.active, .sidebar-menu a:hover { background: rgba(255, 255, 255, 0.04); color: var(--text-primary); }
        .sidebar-footer { padding-top: 1.5rem; border-top: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 0.75rem; }
        .profile-name { font-size: 0.85rem; font-weight: 600; color: var(--text-primary); }

        .main-content { flex-grow: 1; padding: 3rem; overflow-y: auto; }
        .content-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem; }
        .system-status { font-size: 0.85rem; color: var(--text-secondary); display: flex; align-items: center; gap: 0.5rem; }
        .indicator.live { width: 8px; height: 8px; background: var(--success); border-radius: 50%; box-shadow: 0 0 10px var(--success); }

        .status-panel { padding: 1rem; margin-bottom: 1.5rem; }
        .status-panel label { display: block; font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 0.5rem; text-transform: uppercase; }

        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; margin-bottom: 3rem; }
        .metric-card { padding: 1.5rem; }
        .metric-card h5 { color: var(--text-secondary); font-weight: 500; margin-bottom: 0.5rem; font-size: 0.85rem; text-transform: uppercase; }
        .metric-card h2 { font-size: 2rem; font-weight: 700; }

        .section-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 1.5rem; }
        .max-width-md { max-width: 600px; padding: 2.5rem; }

        .table-container { width: 100%; overflow-x: auto; }
        .table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.9rem; }
        .table th { padding: 1rem 1.5rem; color: var(--text-secondary); font-weight: 600; border-bottom: 1px solid var(--border-color); }
        .table td { padding: 1.2rem 1.5rem; border-bottom: 1px solid var(--border-color); color: var(--text-primary); }
        .badge { background: rgba(139, 92, 246, 0.15); color: var(--primary-glow); padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; }
        .status-lbl { font-weight: 600; font-size: 0.85rem; color: var(--accent-cyan); }

        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 0.5rem; color: var(--text-secondary); }
        input, select, textarea { width: 100%; padding: 0.75rem 1rem; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-primary); font-family: var(--font-family); outline: none; }
        input:focus, select:focus, textarea:focus { border-color: var(--primary-glow); }

        .auth-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 1rem; }
        .auth-card { width: 100%; max-width: 440px; padding: 2.5rem; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; z-index: 20000; }
        .modal-card { width: 100%; max-width: 460px; padding: 2.5rem; }

        .toast-container { position: fixed; bottom: 2rem; right: 2rem; display: flex; flex-direction: column; gap: 0.75rem; z-index: 30000; }
        .toast { padding: 1rem 1.5rem; border-radius: 8px; color: white; font-weight: 600; font-size: 0.9rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: slideIn 0.3s forwards; }
        @keyframes slideIn { from { transform: translateX(120%); } to { transform: translateX(0); } }

        footer { width: 100%; padding: 2rem 1rem; border-top: 1px solid rgba(255, 255, 255, 0.05); background: rgba(13, 18, 34, 0.4); backdrop-filter: blur(8px); text-align: center; }
    </style>
</head>
<body>

    <div id="toast-container" class="toast-container"></div>
    <div id="modal-layer"></div>
    <div id="app-root" style="flex: 1; display: flex; flex-direction: column;"></div>

    <template id="view-landing">
        <div class="landing-page">
            <header class="navbar">
                <div class="logo">Consult<span>Link</span></div>
                <div><button class="btn btn-primary" onclick="Router.navigate('auth')">Sign In</button></div>
            </header>
            
            <div class="hero-grid">
                <div class="hero-left">
                    <h1>Expert Professional Advice <br><span class="text-gradient">Right When You Need It.</span></h1>
                    <p class="hero-subtitle">Connect instantly with verified consultants across Law, Medicine, Finance, IT, Mechanics, and Agriculture. Discuss complex problems, safely share files, and receive actionable solutions in minutes.</p>
                    <button class="btn btn-primary btn-lg" onclick="Router.navigate('auth')">Find an Expert</button>
                </div>
                
                <div class="hero-right">
                    <div class="simulated-console glass">
                        <div class="console-header">
                            <div class="console-title"><span style="color:var(--primary-glow);">//</span> Active Specialists Online Now</div>
                            <div class="console-status"><span class="dot"></span> Live Activity Feed</div>
                        </div>
                        <div class="expert-pool-list" id="simulated-human-feed">
                            </div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <template id="view-auth">
        <div class="auth-container">
            <div class="auth-card glass">
                <div class="back-nav" onclick="Router.navigate('landing')">← Back to Homepage</div>
                <h2 id="auth-title" style="margin-bottom:0.5rem;">Welcome Back</h2>
                <p id="auth-subtitle" style="margin-bottom: 1.5rem; font-size: 0.9rem; color: var(--text-secondary);">Log into your account to manage your consultations.</p>
                <form id="auth-form" onsubmit="App.handleAuth(event)">
                    <div class="form-group" id="group-fullname" style="display: none;"><label>Your Full Name</label><input type="text" id="auth-fullname" placeholder="e.g. Suwilanji Puta"></div>
                    <div class="form-group"><label>Email Address</label><input type="email" id="auth-email" required placeholder="name@domain.com"></div>
                    <div class="form-group"><label>Password</label><input type="password" id="auth-password" required placeholder="••••••••"></div>
                    <div class="form-group" id="group-role" style="display: none;">
                        <label>Account Type</label>
                        <select id="auth-role">
                            <option value="client">I am looking for an expert</option>
                            <option value="consultant">I am joining as a professional specialist</option>
                        </select>
                    </div>
                    <div class="form-group id-consultant-fields" id="group-specialty" style="display: none;">
                        <label>Your Professional Field</label>
                        <select id="auth-specialty">
                            <option value="legal">Legal & Law</option>
                            <option value="medical">Medical & Healthcare</option>
                            <option value="financial">Finance & Accounting</option>
                            <option value="it">IT & Systems Development</option>
                            <option value="mechanical">Mechanical & Technical Engineering</option>
                            <option value="agricultural">Agricultural Experts</option>
                        </select>
                    </div>
                    <div class="form-group id-consultant-fields" id="group-rate" style="display: none;"><label>Hourly Consultation Rate (ZMW)</label><input type="number" id="auth-rate" value="1500"></div>
                    <button type="submit" class="btn btn-primary btn-block" id="auth-submit-btn">Sign In</button>
                </form>
                <div class="auth-footer" style="margin-top:1.5rem; text-align:center;"><a href="#" id="auth-toggle-mode" onclick="App.toggleAuthMode(event)" style="color:var(--accent-cyan); text-decoration:none; font-size:0.85rem;">New to the platform? Create an account</a></div>
            </div>
        </div>
    </template>

    <template id="view-client-dashboard">
        <div class="dashboard-layout">
            <aside class="sidebar">
                <div class="sidebar-brand">Consult<span>Link</span></div>
                <nav class="sidebar-menu">
                    <a href="#" id="menu-link-client-overview" class="active" onclick="App.switchTab('client-overview')">My Consultations</a>
                    <a href="#" id="menu-link-client-new-request" onclick="App.switchTab('client-new-request')">Request an Expert</a>
                </nav>
                <div class="sidebar-footer">
                    <span id="client-profile-name" class="profile-name">User Account</span>
                    <button class="btn btn-sm btn-danger" onclick="App.logout()">Log Out</button>
                </div>
            </aside>
            <main class="main-content">
                <header class="content-header"><h2>Client Dashboard</h2><div class="system-status"><span class="indicator live"></span>Secure Session Active</div></header>
                
                <div id="tab-client-overview" class="dashboard-tab">
                    <div class="metrics-grid">
                        <div class="metric-card glass"><h5>Active Sessions</h5><h2 id="m-client-active">0</h2></div>
                        <div class="metric-card glass"><h5>Account Status</h5><h2>Verified</h2></div>
                    </div>
                    <h3 class="section-title">Your Consultation History</h3>
                    <div class="table-container glass">
                        <table class="table">
                            <thead><tr><th>Reference</th><th>Category</th><th>Topic / Headline</th><th>Status</th><th>Available Actions</th></tr></thead>
                            <tbody id="client-requests-table"><tr><td colspan="5" style="text-align:center; padding:2rem;">Connecting to your history files...</td></tr></tbody>
                        </table>
                    </div>
                </div>

                <div id="tab-client-new-request" class="dashboard-tab" style="display:none;">
                    <div class="card glass max-width-md">
                        <h3 style="margin-bottom: 1.5rem;">Create a New Consultation Request</h3>
                        <form id="request-form" onsubmit="App.submitRequest(event)">
                            <div class="form-group">
                                <label>What field of expertise do you need?</label>
                                <select id="req-category">
                                    <option value="legal">Legal & Law</option>
                                    <option value="medical">Medical & Healthcare</option>
                                    <option value="financial">Finance & Accounting</option>
                                    <option value="it">IT & Systems Development</option>
                                    <option value="mechanical">Mechanical & Technical Engineering</option>
                                    <option value="agricultural">Agricultural Experts</option>
                                </select>
                            </div>
                            <div class="form-group"><label>Short Summary Title</label><input type="text" id="req-title" required placeholder="Briefly state your requirement..."></div>
                            <div class="form-group"><label>Detailed Description of your Request / Context</label><textarea id="req-description" rows="5" placeholder="Provide background so our experts can assist you perfectly..." required></textarea></div>
                            <div class="form-group"><label>Supporting Document / Image (Optional)</label><input type="file" id="req-file"></div>
                            <button type="submit" class="btn btn-primary">Submit to Expert Network</button>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </template>

    <template id="view-consultant-dashboard">
        <div class="dashboard-layout">
            <aside class="sidebar">
                <div class="sidebar-brand">Consult<span>Link</span></div>
                <div class="status-panel glass">
                    <label>Availability Status</label>
                    <select id="consultant-status-toggle" onchange="App.updateConsultantStatus(this.value)">
                        <option value="Available">Available (Accepting Projects)</option>
                        <option value="Busy">Busy (In Session)</option>
                        <option value="Offline">Offline</option>
                    </select>
                </div>
                <nav class="sidebar-menu"><a href="#" class="active">Specialist Dashboard</a></nav>
                <div class="sidebar-footer">
                    <span id="consultant-profile-name" class="profile-name">Consultant</span>
                    <button class="btn btn-sm btn-danger" onclick="App.logout()">Disconnect</button>
                </div>
            </aside>
            <main class="main-content">
                <header class="content-header"><h2>Specialist Workspace Console</h2></header>
                <div class="metrics-grid">
                    <div class="metric-card glass"><h5>Professional Performance Score</h5><h2 id="m-consultant-rating">5.00★</h2></div>
                </div>
                <h3 class="section-title">Open Customer Requests Matching Your Field</h3>
                <div class="table-container glass">
                    <table class="table">
                        <thead><tr><th>Request ID</th><th>Project Details</th><th>Actions</th></tr></thead>
                        <tbody id="consultant-queue-table"><tr><td colspan="3" style="text-align:center; padding:2rem;">Scanning open database requests...</td></tr></tbody>
                    </table>
                </div>
            </main>
        </div>
    </template>

    <template id="view-admin-dashboard">
        <div class="dashboard-layout">
            <aside class="sidebar">
                <div class="sidebar-brand">Consult<span>Admin</span></div>
                <nav class="sidebar-menu"><a href="#" class="active">Governance Matrix</a></nav>
                <div class="sidebar-footer"><button class="btn btn-sm btn-danger" onclick="App.logout()">Exit Console</button></div>
            </aside>
            <main class="main-content">
                <div style="margin-bottom: 3rem;">
                    <h3 class="section-title">Consultant Verification Pipeline</h3>
                    <div class="table-container glass">
                        <table class="table">
                            <thead><tr><th>Consultant ID</th><th>Domain</th><th>Rate / Hr</th><th>Clearance</th></tr></thead>
                            <tbody id="admin-consultants-table"></tbody>
                        </table>
                    </div>
                </div>
                <div>
                    <h3 class="section-title">System Disputes & Escalation Queues</h3>
                    <div class="table-container glass">
                        <table class="table">
                            <thead><tr><th>Dispute ID</th><th>Target Request</th><th>Narrative Context</th><th>Resolution Engine</th></tr></thead>
                            <tbody id="admin-disputes-table"></tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </template>

    <footer id="system-footer">
        <div style="max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; gap: 0.5rem;">
            <p style="font-size: 0.85rem; color: rgba(243, 244, 246, 0.6); letter-spacing: 0.5px;">&copy; 2026 ConsultLink Platform. All rights reserved.</p>
            <p style="font-size: 0.8rem; color: rgba(243, 244, 246, 0.4);">Engineered & Maintained by <span style="font-weight: 600; background: linear-gradient(135deg, #06B6D4, #8B5CF6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 0.5px;">Vyeta Digital Solutions</span></p>
        </div>
    </footer>

    <script>
        const ConsultLinkSDK = {
            endpoint: "https://script.google.com/macros/s/AKfycbxUdDlUzsxngPRZ-K1j7KHS117ApHB0dIDKuCeC5cQ5OAG_KLLVik9zm2aDHLBf2dEg/exec",

            async request(action, payload = {}) {
                const token = sessionStorage.getItem('cl_token');
                try {
                    const response = await fetch(this.endpoint, {
                        method: 'POST',
                        mode: 'cors',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action, token, payload })
                    });
                    const data = await response.json();
                    if (!data.success) throw new Error(data.message);
                    return data;
                } catch (error) {
                    App.showToast(error.message, 'error');
                    throw error;
                }
            }
        };

        const Router = {
            navigate(view) {
                const template = document.getElementById(`view-${view}`);
                if (!template) return;
                document.getElementById('app-root').innerHTML = '';
                document.getElementById('app-root').appendChild(template.content.cloneNode(true));
                document.getElementById('system-footer').style.display = (view === 'landing' || view === 'auth') ? 'block' : 'none';
                
                if (view === 'landing') App.runHumanConsoleSimulation();
                if (view === 'client-dashboard') App.loadClientData();
                if (view === 'consultant-dashboard') App.loadConsultantData();
                if (view === 'admin-dashboard') App.loadAdminData();
            }
        };

        const App = {
            isSignUpMode: false,
            simulationInterval: null,
            init() { Router.navigate('landing'); },
            showToast(msg, type = 'success') {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                toast.className = 'toast glass';
                toast.style.borderLeft = `4px solid ${type === 'success' ? 'var(--success)' : 'var(--danger)'}`;
                toast.innerText = msg;
                container.appendChild(toast);
                setTimeout(() => toast.remove(), 4000);
            },
            runHumanConsoleSimulation() {
                if (this.simulationInterval) clearInterval(this.simulationInterval);
                
                const consultants = [
                    { name: "Chileshe Mwaba", domain: "Legal Expert" },
                    { name: "Dr. Naeem Patel", domain: "Medical Expert" },
                    { name: "Mulenga Kafuni", domain: "Financial Expert" },
                    { name: "Suwilanji Puta", domain: "IT Expert" },
                    { name: "Sifuniso Banda", domain: "Mechanical Expert" },
                    { name: "Bupe Chanda", domain: "Agricultural Expert" }
                ];

                const states = ["In Consultation", "Available Online", "In Active Session"];
                const feedContainer = document.getElementById("simulated-human-feed");
                
                const renderFeed = () => {
                    feedContainer.innerHTML = '';
                    consultants.forEach((c, idx) => {
                        const randomState = states[(Math.floor(Math.random() * states.length) + idx) % states.length];
                        const item = document.createElement("div");
                        item.className = "pool-item";
                        item.innerHTML = `
                            <div class="pool-info">
                                <span class="pool-name">${c.name}</span>
                                <span class="pool-domain">${c.domain}</span>
                            </div>
                            <span class="pool-status-tag" id="status-tag-${idx}">${randomState}</span>
                        `;
                        feedContainer.appendChild(item);
                    });
                };

                renderFeed();

                this.simulationInterval = setInterval(() => {
                    const targetIdx = Math.floor(Math.random() * consultants.length);
                    const tag = document.getElementById(`status-tag-${targetIdx}`);
                    if(tag) {
                        const nextState = states[Math.floor(Math.random() * states.length)];
                        tag.innerText = nextState;
                        tag.style.borderColor = 'var(--primary-glow)';
                        setTimeout(() => tag.style.borderColor = 'rgba(6, 182, 212, 0.15)', 400);
                    }
                }, 3000);
            },
            toggleAuthMode(e) {
                e.preventDefault();
                this.isSignUpMode = !this.isSignUpMode;
                document.getElementById('auth-title').innerText = this.isSignUpMode ? 'Create Account' : 'Welcome Back';
                document.getElementById('auth-subtitle').innerText = this.isSignUpMode ? 'Register to consult with specialists or register your services.' : 'Log into your account to manage your consultations.';
                document.getElementById('group-fullname').style.display = this.isSignUpMode ? 'block' : 'none';
                document.getElementById('group-role').style.display = this.isSignUpMode ? 'block' : 'none';
                document.getElementById('auth-submit-btn').innerText = this.isSignUpMode ? 'Register Account' : 'Sign In';
                if(this.isSignUpMode) {
                    document.getElementById('auth-role').addEventListener('change', (ev) => {
                        const display = ev.target.value === 'consultant' ? 'block' : 'none';
                        document.querySelectorAll('.id-consultant-fields').forEach(el => el.style.display = display);
                    });
                }
            },
            async handleAuth(e) {
                e.preventDefault();
                const email = document.getElementById('auth-email').value;
                const password = document.getElementById('auth-password').value;
                if (this.isSignUpMode) {
                    const fullName = document.getElementById('auth-fullname').value;
                    const role = document.getElementById('auth-role').value;
                    const payload = { email, password, fullName, role };
                    if (role === 'consultant') {
                        payload.specialty = document.getElementById('auth-specialty').value;
                        payload.ratePerHour = parseFloat(document.getElementById('auth-rate').value);
                    }
                    await ConsultLinkSDK.request('registerUser', payload);
                    App.showToast("Account created successfully.");
                    this.isSignUpMode = false;
                    Router.navigate('auth');
                } else {
                    const res = await ConsultLinkSDK.request('loginUser', { email, password });
                    if(this.simulationInterval) clearInterval(this.simulationInterval);
                    sessionStorage.setItem('cl_token', res.token);
                    sessionStorage.setItem('cl_role', res.user.role);
                    sessionStorage.setItem('cl_user', JSON.stringify(res.user));
                    Router.navigate(`${res.user.role}-dashboard`);
                }
            },
            logout() { sessionStorage.clear(); Router.navigate('landing'); },
            switchTab(id) {
                document.querySelectorAll('.dashboard-tab').forEach(el => el.style.display = 'none');
                document.getElementById(`tab-${id}`).style.display = 'block';
            },
            async loadClientData() {
                const user = JSON.parse(sessionStorage.getItem('cl_user'));
                document.getElementById('client-profile-name').innerText = user.fullName;
                const res = await ConsultLinkSDK.request('getClientRequests');
                const tbody = document.getElementById('client-requests-table');
                tbody.innerHTML = '';
                res.requests.forEach(r => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${r.id.substring(0,6)}</td>
                        <td><span class="badge">${r.category}</span></td>
                        <td>${r.title}</td>
                        <td><span class="status-lbl">${r.status}</span></td>
                        <td>
                            ${r.status === 'Matched' ? `<button class="btn btn-sm btn-primary" onclick="App.openPaymentModal('${r.id}')">Make Payment</button>` : ''}
                            ${r.status === 'Matched' || r.status === 'Pending' ? `<button class="btn btn-sm btn-danger" onclick="App.openEscalationModal('${r.id}')">Report Issue</button>` : ''}
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            },
            async submitRequest(e) {
                e.preventDefault();
                const category = document.getElementById('req-category').value;
                const title = document.getElementById('req-title').value;
                const description = document.getElementById('req-description').value;
                await ConsultLinkSDK.request('createRequest', { category, title, description });
                App.showToast("Your request has been published to the network.");
                App.switchTab('client-overview');
                App.loadClientData();
            },
            openPaymentModal(reqId) {
                document.getElementById('modal-layer').innerHTML = `
                    <div class="modal-overlay">
                        <div class="modal-card glass">
                            <h3>Mobile Money Secure Checkout</h3>
                            <p style="margin:1rem 0; font-size:0.9rem; color:var(--text-secondary);">Please initiate your transaction via your provider and input your confirmation Reference ID below.</p>
                            <div style="background:rgba(255,255,255,0.03); padding:1rem; border-radius:8px; margin-bottom:1rem; font-size:0.85rem;">
                                <strong>MTN Mobile Money Code:</strong> *115*4*1*MOMO_ID#<br>
                                <strong>Airtel Money Till Code:</strong> *115*4*2*AIRTEL_ID#
                            </div>
                            <div class="form-group"><label>Transaction Reference ID</label><input type="text" id="momo-ref" placeholder="e.g. TXN984328423" required></div>
                            <button class="btn btn-primary btn-block" onclick="App.submitPayment('${reqId}')">Verify & Confirm Payment</button>
                            <button class="btn btn-secondary btn-block" style="margin-top:0.5rem;" onclick="document.getElementById('modal-layer').innerHTML=''">Cancel</button>
                        </div>
                    </div>
                `;
            },
            async submitPayment(reqId) {
                const ref = document.getElementById('momo-ref').value;
                await ConsultLinkSDK.request('executePaymentSimulator', { requestId: reqId, reference: ref });
                document.getElementById('modal-layer').innerHTML = '';
                App.openRatingModal(reqId);
            },
            openRatingModal(reqId) {
                document.getElementById('modal-layer').innerHTML = `
                    <div class="modal-overlay">
                        <div class="modal-card glass">
                            <h3>Rate Your Specialist</h3>
                            <div class="form-group" style="margin-top:1rem;">
                                <label>How would you rate their service? (1-5 Stars)</label>
                                <select id="rate-score"><option value="5">5 Stars (Excellent)</option><option value="4">4 Stars</option><option value="3">3 Stars</option><option value="2">2 Stars</option><option value="1">1 Star (Poor)</option></select>
                            </div>
                            <div class="form-group"><label>Leave a Review</label><textarea id="rate-text" rows="3" placeholder="Write a short comment about your experience..."></textarea></div>
                            <button class="btn btn-primary btn-block" onclick="App.submitRating('${reqId}')">Submit Feedback</button>
                        </div>
                    </div>
                `;
            },
            async submitRating(reqId) {
                const score = parseInt(document.getElementById('rate-score').value);
                const reviewText = document.getElementById('rate-text').value;
                await ConsultLinkSDK.request('submitReview', { requestId: reqId, score, reviewText });
                App.showToast("Thank you for your rating!");
                document.getElementById('modal-layer').innerHTML = '';
                App.loadClientData();
            },
            openEscalationModal(reqId) {
                document.getElementById('modal-layer').innerHTML = `
                    <div class="modal-overlay">
                        <div class="modal-card glass">
                            <h3>Report an Issue</h3>
                            <div class="form-group" style="margin-top:1rem;">
                                <label>What went wrong?</label>
                                <select id="disp-reason"><option value="no_show">Specialist did not attend</option><option value="poor_quality">Substandard service quality</option><option value="technical">Technical issue during call</option></select>
                            </div>
                            <div class="form-group"><label>Please provide more details</label><textarea id="disp-text" rows="4" required placeholder="Describe the issue so support can look into it..."></textarea></div>
                            <button class="btn btn-danger btn-block" onclick="App.submitDispute('${reqId}')">Submit Issue Report</button>
                            <button class="btn btn-secondary btn-block" style="margin-top:0.5rem;" onclick="document.getElementById('modal-layer').innerHTML=''">Cancel</button>
                        </div>
                    </div>
                `;
            },
            async submitDispute(reqId) {
                const reason = document.getElementById('disp-reason').value;
                const text = document.getElementById('disp-text').value;
                await ConsultLinkSDK.request('lodgeDispute', { requestId: reqId, reason, text });
                App.showToast("Your report has been submitted to customer support.", "error");
                document.getElementById('modal-layer').innerHTML = '';
                App.loadClientData();
            },
            async loadConsultantData() {
                const user = JSON.parse(sessionStorage.getItem('cl_user'));
                document.getElementById('consultant-profile-name').innerText = user.fullName;
                const res = await ConsultLinkSDK.request('getConsultantQueue');
                document.getElementById('m-consultant-rating').innerText = `${parseFloat(res.rating || 5).toFixed(2)}★`;
                const tbody = document.getElementById('consultant-queue-table');
                tbody.innerHTML = '';
                res.queue.forEach(item => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td>${item.id.substring(0,6)}</td><td><strong>${item.title}</strong><br><small style="color:var(--text-secondary);">${item.description}</small></td><td><button class="btn btn-sm btn-primary" onclick="App.acceptJob('${item.id}')">Accept Consultation</button></td>`;
                    tbody.appendChild(tr);
                });
            },
            async acceptJob(id) {
                await ConsultLinkSDK.request('acceptConsultationRequest', { requestId: id });
                App.showToast("Consultation assigned to your profile.");
                App.loadConsultantData();
            },
            async updateConsultantStatus(status) {
                await ConsultLinkSDK.request('setConsultantStatus', { status });
                App.showToast(`Your status has been updated to: ${status}`);
            },
            async loadAdminData() {
                const res = await ConsultLinkSDK.request('getAdminConsoleData');
                const tbodyC = document.getElementById('admin-consultants-table');
                tbodyC.innerHTML = '';
                res.consultants.forEach(c => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td>${c.id.substring(0,6)}</td><td><span class="badge">${c.specialty}</span></td><td>K${c.ratePerHour}/hr</td><td>${c.isApproved ? '<span style="color:var(--success);">Approved</span>' : `<button class="btn btn-sm btn-primary" onclick="App.approveAdmin('${c.id}')">Approve Account</button>`}</td>`;
                    tbodyC.appendChild(tr);
                });
                const tbodyD = document.getElementById('admin-disputes-table');
                tbodyD.innerHTML = '';
                res.disputes.forEach(d => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td>${d.id.substring(0,6)}</td><td>${d.requestId.substring(0,6)}</td><td><strong>[${d.reason}]</strong> ${d.text}</td><td><button class="btn btn-sm btn-success" onclick="App.resolveAdmin('${d.id}','refund')">Refund User</button> <button class="btn btn-sm btn-warning" onclick="App.resolveAdmin('${d.id}','payout')">Pay Consultant</button></td>`;
                    tbodyD.appendChild(tr);
                });
            },
            async approveAdmin(id) { await ConsultLinkSDK.request('approveConsultantNode', { consultantId: id }); App.loadAdminData(); },
            async resolveAdmin(id, strategy) { await ConsultLinkSDK.request('resolveDisputeNode', { disputeId: id, resolution: strategy }); App.loadAdminData(); }
        };

        document.addEventListener("DOMContentLoaded", () => App.init());
    </script>
</body>
</html>
